<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>job tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="app">

        <!-- Auth View -->
        <div id="auth-view" class="view hidden">
            <div class="logo">
                <h1 class="brand">job tracker</h1>
                <p class="tagline">sign in to continue</p>
            </div>
            <div id="auth-error" class="error-banner hidden"></div>
            <button id="google-login-btn" class="btn-google">
                <svg viewBox="0 0 24 24" width="15" height="15"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </button>
        </div>

        <!-- Main View -->
        <div id="main-view" class="view hidden">
            <div class="header">
                <span class="brand">job tracker</span>
                <button id="logout-btn" class="btn-ghost">Sign out</button>
            </div>
            <div class="actions">
                <button id="add-job-btn" class="btn-action">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                    Add Job
                </button>
                <p class="hint">Save this listing to your tracker</p>
                <button id="fill-btn" class="btn-action btn-action-blue">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Autofill
                </button>
                <p class="hint">Fill the application form on this page</p>
            </div>
        </div>

        <!-- Add Job View -->
        <div id="add-job-view" class="view hidden">
            <div class="nav-header">
                <button id="back-btn" class="btn-ghost">← Back</button>
                <span class="nav-title">Add Job</span>
            </div>

            <div id="parse-loading" class="loading-row">
                <div class="spinner"></div>
                <span>Reading page...</span>
            </div>

            <form id="add-job-form" class="job-form hidden">
                <div id="add-job-error" class="error-banner hidden"></div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="job-title" placeholder="Software Engineer" />
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="job-company" placeholder="Google" />
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="job-location" placeholder="Remote" />
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="job-status">
                        <option value="Saved">Saved</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Applied" selected>Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
                <button type="submit" id="save-job-btn" class="btn-action btn-action-blue" style="margin-top:4px">
                    Save to Tracker
                </button>
            </form>
        </div>

    </div>
    <script src="popup.js"></script>
</body>
</html>

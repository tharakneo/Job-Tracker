<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #1a1a1e;
            color: #e8e8ed;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
            color: #e8e8ed;
        }

        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 50px;
            background: rgba(100, 160, 255, 0.12);
            color: #5b9df5;
            font-weight: 500;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input,
        .field select {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 8px 10px;
            color: #e8e8ed;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .field input:focus,
        .field select:focus {
            border-color: rgba(91, 157, 245, 0.4);
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .field select {
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .url-display {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 14px;
            padding: 0 2px;
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            background: #5b9df5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-add:hover {
            opacity: 0.9;
        }

        .btn-add:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .msg {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .msg.success {
            background: rgba(80, 200, 120, 0.12);
            color: #50c878;
        }

        .msg.error {
            background: rgba(255, 100, 100, 0.12);
            color: #ff8888;
        }

        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            padding: 20px 0;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #5b9df5;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Job Tracker</h1>
        <span class="status-badge" id="statusBadge">Reading page...</span>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        Extracting job info...
    </div>

    <div id="form" style="display:none;">
        <div class="url-display" id="urlDisplay"></div>

        <div class="field">
            <label>Job Title</label>
            <input id="title" placeholder="e.g. Software Engineer">
        </div>

        <div class="field">
            <label>Company</label>
            <input id="company" placeholder="e.g. Google">
        </div>

        <div class="field">
            <label>Location</label>
            <input id="location" placeholder="e.g. New York, NY">
        </div>

        <div class="field">
            <label>Status</label>
            <select id="status">
                <option value="Saved">Saved</option>
                <option value="In Progress">In Progress</option>
                <option value="Applied" selected>Applied</option>
                <option value="Interview">Interview</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>

        <button class="btn-add" id="addBtn">Add to Job Tracker</button>
        <div id="message"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
